<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>layout responsivel</title>
	<style>
		* {box-sizing: border-box;}
           body{
           	margin: 0;
            color: pink;
            
           }     

           .cabecalho{
           	padding: 16px;
           	background-color: white;

           }

           /*** layout padrão para desktop ***/

      
          
           .container{
           	display: flex;
           	max-width: 980px;
           	margin: 1 auto;
           	padding: 5px;
           }
           .esquerda{
           	width: 400px;
           	padding: 5px;
           	background-color:color-mix(purple,black,orange);
           }
           .principal{
           	width: 100%;
           	padding: 5px;
           	background-color:color-mix(purple,black,orange);
            flex: 1px
           }
           .direita{
           	width: 500px;
           	padding: 5px;
           	background-color:color-mix(purple,black,orange);
           }
             

           /*** layout para tablets ****/

           @media(max-width: 900px){
           .container{
              flex-wrap: wrap;
           }
           .esquerda{
           	width: 300px;
            flex: 1 1 150px;
           }
           .principal{
           	 flex: 1 1 100%;
           	 width: auto;
           	 min-width: 400px;
           }
           .direita{
           	width: 50%;
           	flex: 1 1 50%;
           }
           }

           /***layout para dispositivos moveis(celular)***/
           @media (max-width: 600px){
           .container{
           	flex-direction: column;
           }
           .esquerda, .principal, .direita{
            padding: 150px;
           	width: 100%;
           	flex: 0 1 auto;
            min-width: 300px;
           }
           
           .rodape{
           	padding: 16px;
           	background: skyblue;
           	margin-top: 8px;
           }

           .h1{
            border: 200px;
            margin: auto;
           }
        }
          body {
  background-image: url('imagens/fundo.JPG');
}


</style>

</head>
<body>

	</div>
